<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro Midterm Exam — PT Edition</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #0d6e6e;
    --teal-light: #1a9090;
    --teal-pale: #e0f5f5;
    --red: #c0392b;
    --red-pale: #fdecea;
    --green: #1a7a4a;
    --green-pale: #e8f5ee;
    --gold: #c9a84c;
    --navy: #0f2744;
    --navy-mid: #1c3d60;
    --cream: #f9f5ef;
    --white: #ffffff;
    --gray: #8a9bb0;
    --gray-light: #e8edf3;
    --text: #1e2d3d;
    --shadow: 0 4px 24px rgba(15,39,68,0.10);
    --shadow-lg: 0 12px 48px rgba(15,39,68,0.16);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--navy);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    max-width: 1300px;
    margin: 0 auto;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 40px;
    height: 40px;
    background: var(--teal);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .logo-text {
    color: white;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.75;
  }
  .logo-title {
    color: white;
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
  }
  .header-badge {
    background: var(--teal);
    color: white;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
  }

  /* HERO STRIP */
  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, var(--teal) 100%);
    padding: 48px 32px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% 50%, rgba(13,110,110,0.3) 0%, transparent 70%);
  }
  .hero-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    position: relative;
  }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(26px, 4vw, 42px);
    color: white;
    line-height: 1.15;
    margin-bottom: 12px;
    position: relative;
  }
  .hero h1 em {
    color: #7ee8e8;
    font-style: italic;
  }
  .hero-sub {
    color: rgba(255,255,255,0.65);
    font-size: 14px;
    position: relative;
  }
  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 28px;
    position: relative;
  }
  .hero-stat {
    text-align: center;
  }
  .hero-stat-num {
    font-family: 'Courier Prime', monospace;
    font-size: 28px;
    font-weight: 700;
    color: #7ee8e8;
    line-height: 1;
  }
  .hero-stat-label {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  /* MAIN LAYOUT */
  main {
    max-width: 1300px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  /* TOPIC NAV TABS */
  .topic-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }
  .tab-btn {
    padding: 9px 18px;
    border: 2px solid transparent;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    background: white;
    color: var(--navy-mid);
    border-color: var(--gray-light);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .tab-btn:hover {
    border-color: var(--teal);
    color: var(--teal);
  }
  .tab-btn.active {
    background: var(--teal);
    border-color: var(--teal);
    color: white;
    box-shadow: 0 4px 12px rgba(13,110,110,0.25);
  }
  .tab-btn.all-tab.active {
    background: var(--navy);
    border-color: var(--navy);
  }

  /* QUIZ AREA */
  .quiz-section { display: none; }
  .quiz-section.active { display: block; }

  /* PROGRESS BAR */
  .progress-wrap {
    background: white;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .progress-info { flex: 1; }
  .progress-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--gray);
    margin-bottom: 8px;
  }
  .progress-bar-bg {
    height: 8px;
    background: var(--gray-light);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), #2bc0c0);
    border-radius: 999px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-count {
    font-family: 'Courier Prime', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--navy);
    white-space: nowrap;
  }
  .score-badge {
    background: var(--teal-pale);
    color: var(--teal);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* QUESTION CARD */
  .question-card {
    background: white;
    border-radius: 16px;
    padding: 32px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    animation: fadeSlide 0.35s ease;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .question-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .q-num {
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    color: var(--gray);
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .q-topic-tag {
    background: var(--teal-pale);
    color: var(--teal);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .q-type-tag {
    background: #f0f4ff;
    color: #4466cc;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .question-text {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--navy);
    line-height: 1.45;
    margin-bottom: 24px;
  }

  /* OPTIONS */
  .options-grid {
    display: grid;
    gap: 10px;
  }
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 20px;
    border: 2px solid var(--gray-light);
    border-radius: 10px;
    background: white;
    cursor: pointer;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    transition: all 0.18s;
    line-height: 1.45;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--teal);
    background: var(--teal-pale);
    transform: translateX(3px);
  }
  .option-btn:disabled { cursor: default; }
  .option-letter {
    min-width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--gray-light);
    color: var(--navy-mid);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.18s;
  }
  .option-btn.correct {
    border-color: var(--green);
    background: var(--green-pale);
  }
  .option-btn.correct .option-letter {
    background: var(--green);
    color: white;
  }
  .option-btn.wrong {
    border-color: var(--red);
    background: var(--red-pale);
  }
  .option-btn.wrong .option-letter {
    background: var(--red);
    color: white;
  }
  .option-btn.reveal-correct {
    border-color: var(--green);
    background: var(--green-pale);
    opacity: 0.7;
  }

  /* FEEDBACK */
  .feedback-box {
    margin-top: 18px;
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    animation: fadeSlide 0.25s ease;
  }
  .feedback-box.correct {
    background: var(--green-pale);
    border-left: 4px solid var(--green);
    color: var(--green);
    display: block;
  }
  .feedback-box.wrong {
    background: var(--red-pale);
    border-left: 4px solid var(--red);
    color: var(--red);
    display: block;
  }
  .feedback-box strong { display: block; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }

  /* NAV BUTTONS */
  .nav-buttons {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    gap: 12px;
  }
  .btn {
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .btn-primary {
    background: var(--teal);
    color: white;
    box-shadow: 0 4px 14px rgba(13,110,110,0.28);
  }
  .btn-primary:hover { background: var(--teal-light); transform: translateY(-1px); }
  .btn-secondary {
    background: white;
    color: var(--navy-mid);
    border: 2px solid var(--gray-light);
  }
  .btn-secondary:hover { border-color: var(--teal); color: var(--teal); }
  .btn-navy {
    background: var(--navy);
    color: white;
    box-shadow: 0 4px 14px rgba(15,39,68,0.25);
  }
  .btn-navy:hover { background: var(--navy-mid); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* RESULTS */
  .results-card {
    background: white;
    border-radius: 20px;
    padding: 48px 40px;
    box-shadow: var(--shadow-lg);
    text-align: center;
    animation: fadeSlide 0.4s ease;
    display: none;
  }
  .results-card.show { display: block; }
  .results-icon {
    font-size: 56px;
    margin-bottom: 16px;
  }
  .results-title {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .results-sub {
    color: var(--gray);
    font-size: 15px;
    margin-bottom: 32px;
  }
  .score-ring {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: conic-gradient(var(--teal) var(--pct, 0%), var(--gray-light) 0%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    box-shadow: 0 0 0 8px var(--teal-pale);
    position: relative;
  }
  .score-ring-inner {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .score-pct {
    font-family: 'Courier Prime', monospace;
    font-size: 30px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
  }
  .score-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; }
  .results-breakdown {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .breakdown-item {
    background: var(--cream);
    border-radius: 12px;
    padding: 16px 24px;
    min-width: 100px;
  }
  .breakdown-num {
    font-family: 'Courier Prime', monospace;
    font-size: 26px;
    font-weight: 700;
  }
  .breakdown-num.green { color: var(--green); }
  .breakdown-num.red { color: var(--red); }
  .breakdown-label {
    font-size: 12px;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-top: 2px;
  }
  .grade-banner {
    padding: 14px 28px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 16px;
    margin: 0 auto 28px;
    display: inline-block;
  }
  .grade-a { background: var(--green-pale); color: var(--green); }
  .grade-b { background: #eef4ff; color: #2255cc; }
  .grade-c { background: #fff8e0; color: #a07000; }
  .grade-d { background: var(--red-pale); color: var(--red); }

  /* TOPIC REVIEW TABLE */
  .review-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    font-size: 13px;
    text-align: left;
  }
  .review-table th {
    background: var(--navy);
    color: rgba(255,255,255,0.75);
    padding: 10px 14px;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.07em;
  }
  .review-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--gray-light);
    vertical-align: top;
  }
  .review-table tr:last-child td { border-bottom: none; }
  .review-table tr:nth-child(even) td { background: var(--cream); }
  .pill-correct { background: var(--green-pale); color: var(--green); border-radius: 6px; padding: 2px 8px; font-weight: 700; font-size: 12px; }
  .pill-wrong { background: var(--red-pale); color: var(--red); border-radius: 6px; padding: 2px 8px; font-weight: 700; font-size: 12px; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray);
  }
  .empty-state-icon { font-size: 48px; margin-bottom: 12px; }

  /* SHIMMER LOADER */
  .shimmer {
    background: linear-gradient(90deg, var(--gray-light) 25%, #f0f4f8 50%, var(--gray-light) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 8px;
    height: 20px;
    margin-bottom: 10px;
  }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

  /* ── MOBILE RESPONSIVE ── */
  @media (max-width: 768px) {
    /* Header */
    .header-inner { padding: 12px 16px; }
    .logo-text { display: none; }
    .logo-title { font-size: 15px; }
    .logo-icon { width: 34px; height: 34px; font-size: 17px; border-radius: 8px; }

    /* Hero */
    .hero { padding: 28px 16px 24px; }
    .hero h1 { font-size: clamp(20px, 6vw, 30px); }
    .hero-sub { font-size: 12px; }
    .hero-stats { gap: 20px; margin-top: 20px; }
    .hero-stat-num { font-size: 22px; }
    .hero-stat-label { font-size: 10px; }

    /* Main */
    main { padding: 16px 12px 100px; }

    /* Tabs — horizontal scroll strip */
    .topic-nav {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      padding-bottom: 8px;
      gap: 8px;
      /* hide scrollbar visually */
      scrollbar-width: none;
    }
    .topic-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0;
      scroll-snap-align: start;
      padding: 10px 16px;
      font-size: 13px;
      min-height: 44px; /* iOS tap target */
      white-space: nowrap;
    }

    /* Progress bar */
    .progress-wrap {
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 16px;
    }
    .progress-info { flex: 1 1 100%; order: 1; }
    .progress-count { order: 2; font-size: 17px; }
    .score-badge { order: 3; font-size: 12px; padding: 5px 10px; }

    /* Question card */
    .question-card {
      padding: 20px 16px;
      border-radius: 12px;
      /* leave room for fixed nav buttons */
      margin-bottom: 12px;
    }
    .question-text {
      font-size: 17px;
      margin-bottom: 18px;
    }
    .question-meta { flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .q-num { font-size: 11px; }
    .q-topic-tag, .q-type-tag { font-size: 10px; padding: 3px 8px; }

    /* Options — bigger tap area */
    .option-btn {
      padding: 14px 14px;
      font-size: 14px;
      min-height: 52px;
      border-radius: 10px;
      gap: 12px;
    }
    .option-btn:hover:not(:disabled) { transform: none; } /* disable hover translate on touch */
    .option-letter {
      min-width: 32px;
      height: 32px;
      font-size: 13px;
    }

    /* Feedback box */
    .feedback-box { font-size: 13px; padding: 14px 14px; }

    /* Nav buttons — fixed bottom bar on mobile */
    .nav-buttons {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid var(--gray-light);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      display: flex;
      gap: 10px;
      z-index: 200;
      box-shadow: 0 -4px 20px rgba(15,39,68,0.10);
    }
    .btn {
      flex: 1;
      text-align: center;
      padding: 14px 12px;
      font-size: 15px;
      min-height: 50px;
      border-radius: 10px;
    }

    /* Results card */
    .results-card { padding: 28px 16px 32px; border-radius: 14px; }
    .results-title { font-size: 24px; }
    .score-ring { width: 120px; height: 120px; }
    .score-ring-inner { width: 92px; height: 92px; }
    .score-pct { font-size: 24px; }
    .results-breakdown { gap: 12px; }
    .breakdown-item { padding: 12px 16px; min-width: 80px; }
    .breakdown-num { font-size: 22px; }
    .grade-banner { font-size: 14px; padding: 12px 18px; }

    /* Review table — card-style on mobile */
    .review-table thead { display: none; }
    .review-table, .review-table tbody, .review-table tr, .review-table td {
      display: block;
      width: 100%;
    }
    .review-table tr {
      background: white;
      border-radius: 10px;
      margin-bottom: 10px;
      padding: 12px 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      position: relative;
    }
    .review-table tr:nth-child(even) td { background: transparent; }
    .review-table td {
      padding: 3px 0;
      border: none;
      font-size: 13px;
      line-height: 1.5;
    }
    .review-table td:nth-child(1) { font-weight: 700; color: var(--gray); font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; }
    .review-table td:nth-child(2) { font-weight: 600; color: var(--navy); font-size: 14px; margin: 4px 0 6px; }
    .review-table td:nth-child(3)::before { content: 'Your answer: '; color: var(--gray); font-size: 11px; font-weight: 600; text-transform: uppercase; display: block; }
    .review-table td:nth-child(4)::before { content: 'Correct: '; color: var(--green); font-size: 11px; font-weight: 600; text-transform: uppercase; display: block; }
    .review-table td:nth-child(5) { position: absolute; top: 12px; right: 14px; }
    .pill-correct, .pill-wrong { font-size: 13px; padding: 3px 10px; }

    /* Retake button */
    .results-card > .btn { width: 100%; }
  }

  @media (max-width: 380px) {
    .hero h1 { font-size: 18px; }
    .question-text { font-size: 15px; }
    .option-btn { font-size: 13px; }
    .tab-btn { font-size: 12px; padding: 9px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🧠</div>
      <div>
        <div class="logo-text">OPHT 1-1 · Midterm Review</div>
        <div class="logo-title">NeuroSci Exam Prep</div>
      </div>
    </div>
    <div class="header-badge">PT Edition</div>
  </div>
</header>

<div class="hero">
  <div class="hero-eyebrow">Physical Therapy · Neuroscience · Midterms</div>
  <h1>Ventricles, Coverings &<br><em>Vascular Supply</em> of the Brain</h1>
  <div class="hero-sub">Lesson 1 — Interactive Exam Practice · Sumalpong, Princess Kaeleen Loisse S.</div>
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="hero-stat-num" id="total-q-count">52</div>
      <div class="hero-stat-label">Questions</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-num">5</div>
      <div class="hero-stat-label">Topic Areas</div>

    ans: 2,
    exp: 'The facial nerve (CN VII) and vestibulocochlear nerve (CN VIII) pass through the internal acoustic meatus, along with the internal auditory artery.'
  },
  {
    topic: 'skull',
    topicLabel: 'Skull & Foramina',
    q: 'In an adult, what happens when the brain swells after injury due to the skull\'s rigid nature?',
    opts: ['The skull expands to accommodate the swelling','The brain volume can increase beyond the capacity of the intact cranium','CSF production immediately stops','Venous sinuses expand to compensate'],
    ans: 1,
    exp: 'In adults, the skull is rigid. Therefore, the volume of the brain can increase beyond the capacity of the intact cranium as a result of swelling after injury, leading to dangerous increases in intracranial pressure.'
  }
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const state = {}; // keyed by topic id

function getQs(topicId) {
  if (topicId === 'all') return [...questions];
  return questions.filter(q => q.topic === topicId);
}

function initState(topicId) {
  const qs = getQs(topicId);
  state[topicId] = {
    idx: 0,
    score: 0,
    answered: new Array(qs.length).fill(null), // null | index of chosen option
    done: false,
    qs
  };
}

// ─────────────────────────────────────────────
// RENDER TABS
// ─────────────────────────────────────────────
function buildTabs() {
  const nav = document.getElementById('topicNav');
  topics.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (t.id === 'all' ? ' all-tab' : '') + (i === 0 ? ' active' : '');
    const qCount = getQs(t.id).length;
    btn.innerHTML = `${t.label} <span style="opacity:0.6;font-size:11px;margin-left:4px">(${qCount})</span>`;
    btn.dataset.topic = t.id;
    btn.onclick = () => switchTab(t.id);
    nav.appendChild(btn);
  });
}

function switchTab(topicId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-topic="${topicId}"]`).classList.add('active');
  document.querySelectorAll('.quiz-section').forEach(s => s.classList.remove('active'));
  document.getElementById(`section-${topicId}`).classList.add('active');
  const activeBtn = document.querySelector(`[data-topic="${topicId}"]`);
  activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  window.scrollTo({ top: document.querySelector('main').offsetTop - 70, behavior: 'smooth' });
}

// ─────────────────────────────────────────────
// RENDER SECTIONS
// ─────────────────────────────────────────────
function buildSections() {
  const container = document.getElementById('quizContainer');
  topics.forEach((t, i) => {
    initState(t.id);
    const section = document.createElement('div');
    section.className = 'quiz-section' + (i === 0 ? ' active' : '');
    section.id = `section-${t.id}`;
    section.innerHTML = `
      <div class="progress-wrap" id="progress-${t.id}">
        <div class="progress-info">
          <div class="progress-label">Progress</div>
          <div class="progress-bar-bg"><div class="progress-bar-fill" id="pbar-${t.id}" style="width:0%"></div></div>
        </div>
        <div class="progress-count" id="pcnt-${t.id}">0 / ${state[t.id].qs.length}</div>
        <div class="score-badge" id="sbadge-${t.id}">Score: 0</div>
      </div>
      <div id="qcard-${t.id}"></div>
      <div class="results-card" id="results-${t.id}"></div>
    `;
    container.appendChild(section);
    renderQuestion(t.id);
  });
}

function renderQuestion(topicId) {
  const s = state[topicId];
  const card = document.getElementById(`qcard-${topicId}`);

  if (s.done) {
    showResults(topicId);
    return;
  }

  const q = s.qs[s.idx];
  const letters = ['A','B','C','D','E'];
  const alreadyAnswered = s.answered[s.idx] !== null;
  const chosen = s.answered[s.idx];

  const optHtml = q.opts.map((opt, oi) => {
    let cls = 'option-btn';
    if (alreadyAnswered) {
      if (oi === q.ans) cls += ' correct';
      else if (oi === chosen && chosen !== q.ans) cls += ' wrong';
    }
    return `<button class="${cls}" ${alreadyAnswered ? 'disabled' : ''} onclick="pickAnswer('${topicId}',${oi})">
      <span class="option-letter">${letters[oi]}</span>
      <span>${opt}</span>
    </button>`;
  }).join('');

  let feedbackHtml = '';
  if (alreadyAnswered) {
    const correct = chosen === q.ans;
    feedbackHtml = `<div class="feedback-box ${correct ? 'correct' : 'wrong'}">
      <strong>${correct ? '✓ Correct!' : '✗ Incorrect'}</strong>
      ${q.exp}
    </div>`;
  }

  const isLast = s.idx === s.qs.length - 1;

  card.innerHTML = `
    <div class="question-card">
      <div class="question-meta">
        <span class="q-num">Q${s.idx + 1} of ${s.qs.length}</span>
        <span class="q-topic-tag">${q.topicLabel}</span>
        <span class="q-type-tag">MCQ</span>
      </div>
      <div class="question-text">${q.q}</div>
      <div class="options-grid">${optHtml}</div>
      ${feedbackHtml}
      <div class="nav-buttons">
        <button class="btn btn-secondary" onclick="prevQ('${topicId}')" ${s.idx === 0 ? 'disabled' : ''}>← Previous</button>
        <button class="btn btn-primary" onclick="nextQ('${topicId}')" ${!alreadyAnswered ? 'disabled' : ''}>
          ${isLast ? '🏁 Finish' : 'Next →'}
        </button>
      </div>
    </div>
  `;
  updateProgress(topicId);
  // On mobile, scroll so question card is visible above the fixed nav bar
  const cardEl = document.getElementById(`qcard-${topicId}`);
  if (cardEl) {
    const top = cardEl.getBoundingClientRect().top + window.scrollY - 80;
    if (window.scrollY > top + 40) window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
  }
}

function pickAnswer(topicId, optIdx) {
  const s = state[topicId];
  if (s.answered[s.idx] !== null) return;
  s.answered[s.idx] = optIdx;
  if (optIdx === s.qs[s.idx].ans) s.score++;
  renderQuestion(topicId);
}

function nextQ(topicId) {
  const s = state[topicId];
  if (s.answered[s.idx] === null) return;
  if (s.idx === s.qs.length - 1) {
    s.done = true;
    showResults(topicId);
  } else {
    s.idx++;
    renderQuestion(topicId);
  }
}

function prevQ(topicId) {
  const s = state[topicId];
  if (s.idx > 0) { s.idx--; renderQuestion(topicId); }
}

function updateProgress(topicId) {
  const s = state[topicId];
  const answered = s.answered.filter(a => a !== null).length;
  const pct = Math.round((answered / s.qs.length) * 100);
  document.getElementById(`pbar-${topicId}`).style.width = pct + '%';
  document.getElementById(`pcnt-${topicId}`).textContent = `${s.idx + 1} / ${s.qs.length}`;
  document.getElementById(`sbadge-${topicId}`).textContent = `Score: ${s.score}`;
}

function showResults(topicId) {
  const s = state[topicId];
  const card = document.getElementById(`qcard-${topicId}`);
  const results = document.getElementById(`results-${topicId}`);
  card.innerHTML = '';

  const pct = Math.round((s.score / s.qs.length) * 100);
  const wrong = s.qs.length - s.score;

  let gradeClass, gradeText, emoji;
  if (pct >= 90) { gradeClass='grade-a'; gradeText='Excellent — Outstanding Performance!'; emoji='🏆'; }
  else if (pct >= 75) { gradeClass='grade-b'; gradeText='Good — Well Done!'; emoji='👏'; }
  else if (pct >= 60) { gradeClass='grade-c'; gradeText='Passing — Keep Reviewing!'; emoji='📚'; }
  else { gradeClass='grade-d'; gradeText='Needs Improvement — Study More!'; emoji='💪'; }

  // per-question review table
  const rows = s.qs.map((q, i) => {
    const ch = s.answered[i];
    const ok = ch === q.ans;
    return `<tr>
      <td><b>Q${i+1}</b></td>
      <td>${q.q.substring(0, 70)}${q.q.length > 70 ? '…' : ''}</td>
      <td>${ch !== null ? q.opts[ch] : '—'}</td>
      <td>${q.opts[q.ans]}</td>
      <td>${ch !== null ? `<span class="${ok ? 'pill-correct' : 'pill-wrong'}">${ok ? '✓' : '✗'}</span>` : '—'}</td>
    </tr>`;
  }).join('');

  results.className = 'results-card show';
  results.innerHTML = `
    <div class="results-icon">${emoji}</div>
    <div class="results-title">Exam Complete!</div>
    <div class="results-sub">${topics.find(t=>t.id===topicId)?.label ?? ''}</div>
    <div class="score-ring" style="--pct: ${pct * 3.6}deg">
      <div class="score-ring-inner">
        <div class="score-pct">${pct}%</div>
        <div class="score-label">Score</div>
      </div>
    </div>
    <div class="grade-banner ${gradeClass}">${gradeText}</div>
    <div class="results-breakdown">
      <div class="breakdown-item"><div class="breakdown-num">${s.qs.length}</div><div class="breakdown-label">Total</div></div>
      <div class="breakdown-item"><div class="breakdown-num green">${s.score}</div><div class="breakdown-label">Correct</div></div>
      <div class="breakdown-item"><div class="breakdown-num red">${wrong}</div><div class="breakdown-label">Wrong</div></div>
    </div>
    <div style="overflow-x:auto;margin-bottom:28px">
      <table class="review-table">
        <thead><tr><th>#</th><th>Question</th><th>Your Answer</th><th>Correct Answer</th><th>Result</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <button class="btn btn-navy" onclick="retakeExam('${topicId}')">🔄 Retake This Exam</button>
  `;
  document.getElementById(`pbar-${topicId}`).style.width = '100%';
  document.getElementById(`pcnt-${topicId}`).textContent = `${s.qs.length} / ${s.qs.length}`;
  document.getElementById(`sbadge-${topicId}`).textContent = `Final Score: ${s.score}/${s.qs.length}`;
}

function retakeExam(topicId) {
  initState(topicId);
  document.getElementById(`results-${topicId}`).className = 'results-card';
  renderQuestion(topicId);
}

// INIT
buildTabs();
buildSections();
document.getElementById('total-q-count').textContent = questions.length;
</script>
</body>
</html>
